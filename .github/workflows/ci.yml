name: ci

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      force_invalid_direct_url:
        description: >-
          Fuerza una DIRECT_URL inválida para probar el escenario negativo
          de migración. No toca el secreto real DIRECT_URL.
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: senal_de_vida
          POSTGRES_PASSWORD: senal_de_vida
          POSTGRES_DB: senal_de_vida
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U senal_de_vida"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://senal_de_vida:senal_de_vida@localhost:5432/senal_de_vida?schema=public
      DIRECT_URL: postgresql://senal_de_vida:senal_de_vida@localhost:5432/senal_de_vida?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Generar Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Aplicar la migración baseline contra el Postgres de servicio
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Compilar el backend (tsc)
        working-directory: backend
        run: npm run build

      - name: Construir la imagen Docker real del backend
        run: docker build -t senal-de-vida-api:ci ./backend

      - name: Pruebas del backend (Vitest + Supertest contra Postgres real)
        working-directory: backend
        run: npx vitest run

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Build de producción del frontend
        working-directory: frontend
        run: npm run build

      - name: 'Prueba: desajuste de commit detectado y bloqueado (fixture, sin tocar producción)'
        run: scripts/test-assert-commit-match.sh

      - name: 'Prueba: verificación del deployment de producción real de Vercel (fixture, sin tocar producción)'
        run: scripts/test-vercel-parse-production-target.sh

      - name: 'Prueba: DATABASE_URL pooled inválida detectada por el smoke test (fixture, sin tocar producción)'
        run: scripts/verify-smoke-health-negative.sh

      - name: 'Prueba: deadline de reloj real del smoke test de /health (fixture, sin tocar producción)'
        run: scripts/test-smoke-health-deadline.sh

      - name: 'Prueba: recorrido completo del smoke test a través del proxy (fixture, sin tocar producción)'
        run: scripts/test-smoke-proxy-health.sh

      - name: 'Prueba: deadline de reloj real del smoke test a través del proxy (fixture, sin tocar producción)'
        run: scripts/test-smoke-proxy-health-deadline.sh

  migrate:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # DATABASE_URL no la usa `migrate deploy`, pero la validación del
      # schema de Prisma exige que el datasource resuelva `url` también.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: >-
        ${{
          (github.event_name == 'workflow_dispatch' && inputs.force_invalid_direct_url)
            && 'postgresql://invalid:invalid@127.0.0.1:1/invalid?connect_timeout=1'
            || secrets.DIRECT_URL
        }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Generar Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Migrar contra Neon (DIRECT_URL)
        working-directory: backend
        run: npx prisma migrate deploy

  deploy-render:
    needs: migrate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    outputs:
      backend_url: ${{ steps.backend.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Desactivar auto-deploy nativo de Render
        run: |
          http_code="$(curl -s -o /tmp/render-response.json -w '%{http_code}' -X PATCH "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"autoDeploy": "no"}')"
          echo "HTTP $http_code"
          cat /tmp/render-response.json
          if [ "$http_code" -ge 300 ]; then
            echo "::error::La API de Render devolvió $http_code al desactivar autoDeploy"
            exit 1
          fi

      - name: Disparar deploy anclado a github.sha
        id: trigger
        run: |
          http_code="$(curl -s -o /tmp/render-deploy.json -w '%{http_code}' -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"${GITHUB_SHA}\"}")"
          echo "HTTP $http_code"
          cat /tmp/render-deploy.json
          if [ "$http_code" -ge 300 ]; then
            echo "::error::La API de Render devolvió $http_code al disparar el deploy"
            exit 1
          fi
          deploy_id="$(jq -r '.id' /tmp/render-deploy.json)"
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "::error::La API de Render no devolvió un id de deploy"
            exit 1
          fi
          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Esperar a que el deploy quede live y confirmar el commit
        run: |
          deploy_id="${{ steps.trigger.outputs.deploy_id }}"
          for i in $(seq 1 60); do
            http_code="$(curl -s -o /tmp/render-poll.json -w '%{http_code}' "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")"
            if [ "$http_code" -ge 300 ]; then
              echo "::error::La API de Render devolvió $http_code al consultar el deploy"
              cat /tmp/render-poll.json
              exit 1
            fi
            deploy="$(cat /tmp/render-poll.json)"
            status="$(echo "$deploy" | jq -r '.status')"
            commit_id="$(echo "$deploy" | jq -r '.commit.id // .commit.sha // empty')"
            echo "intento $i: status=$status commit=$commit_id"
            if [ "$status" = "live" ]; then
              scripts/assert-commit-match.sh "$commit_id" "${GITHUB_SHA}"
              echo "Render desplegó exactamente github.sha y está live."
              exit 0
            fi
            case "$status" in
              build_failed|update_failed|canceled|deactivated|pre_deploy_failed)
                echo "::error::Deploy de Render terminó en estado $status"
                echo "$deploy"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::Timeout esperando que el deploy de Render quede live"
          exit 1

      - name: Obtener la URL pública real del servicio de Render
        id: backend
        run: |
          http_code="$(curl -s -o /tmp/render-service.json -w '%{http_code}' "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")"
          echo "HTTP $http_code"
          if [ "$http_code" -ge 300 ]; then
            echo "::error::La API de Render devolvió $http_code al consultar el servicio"
            exit 1
          fi
          url="$(jq -r '.serviceDetails.url // empty' /tmp/render-service.json)"
          if [ -z "$url" ]; then
            echo "::error::La API de Render no devolvió serviceDetails.url para el servicio"
            exit 1
          fi
          echo "URL pública del backend: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-vercel:
    needs: migrate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    outputs:
      frontend_domain: ${{ steps.production.outputs.domain }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar Vercel CLI y dependencias del frontend (para el smoke/axe)
        run: npm install -g vercel@latest

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Vincular proyecto y descargar configuración de Preview
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build único del frontend
        working-directory: frontend
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy del artefacto prebuilt a Preview
        id: preview
        working-directory: frontend
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" --meta commitSha="${GITHUB_SHA}")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview desplegado en $url"

      - name: Confirmar que el preview rechaza requests sin bypass
        run: |
          status="$(curl -sS -D /tmp/preview-sin-bypass.headers -o /dev/null -w '%{http_code}' "${{ steps.preview.outputs.url }}/")"
          echo "status=$status"
          if [ "$status" != "302" ] || ! grep -qi '^location: https://vercel.com/sso-api' /tmp/preview-sin-bypass.headers; then
            echo "::error::El preview no demostró la redirección esperada al SSO de Vercel sin bypass"
            exit 1
          fi

      - name: Smoke test contra el preview con bypass
        run: |
          status="$(curl -sS -o /dev/null -w '%{http_code}' "${{ steps.preview.outputs.url }}/" \
            -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}")"
          echo "status=$status"
          if [ "$status" != "200" ]; then
            echo "::error::El preview respondió $status en vez de 200 con el bypass de automatización"
            exit 1
          fi

      - name: Instalar navegadores de Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Escaneo de accesibilidad (axe-core) contra el preview
        working-directory: frontend
        env:
          SMOKE_URL: ${{ steps.preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test e2e/deployed-smoke.spec.ts

      - name: Promover el preview a producción (dispara un rebuild completo)
        working-directory: frontend
        # --timeout=0: solicita la promoción y retorna de inmediato; la
        # confirmación real la hace el polling explícito del paso siguiente,
        # no el timeout interno (ambiguo) de `vercel promote`.
        run: vercel promote "${{ steps.preview.outputs.url }}" --token="$VERCEL_TOKEN" --yes --timeout=0

      - name: Esperar al deployment de producción real y confirmar su commit
        id: production
        run: |
          output="$(scripts/vercel-wait-production-ready.sh "${GITHUB_SHA}")"
          echo "$output"
          domain="$(echo "$output" | grep '^domain=' | cut -d= -f2-)"
          if [ -z "$domain" ]; then
            echo "::error::vercel-wait-production-ready.sh no devolvió un dominio"
            exit 1
          fi
          echo "domain=$domain" >> "$GITHUB_OUTPUT"

      - name: Smoke HTTP contra el dominio real de producción
        run: |
          domain="${{ steps.production.outputs.domain }}"
          status="$(curl -sS -o /dev/null -w '%{http_code}' "https://${domain}/")"
          echo "status=$status"
          if [ "$status" != "200" ]; then
            echo "::error::El dominio real de producción (${domain}) respondió $status en vez de 200"
            exit 1
          fi
          echo "Producción real (${domain}) responde 200 con exactamente github.sha."

  runtime-smoke:
    needs: [deploy-render, deploy-vercel]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # /live nunca toca la base de datos (backend/tests/live.test.ts lo
      # prueba mockeando $queryRaw), así que no hace falta romper Neon aquí
      # para demostrar esa independencia -- solo confirmamos el contrato
      # HTTP real contra el backend desplegado.
      - name: 'Verificación de liveness (/live) del backend real de Render, independiente de la base de datos'
        run: |
          backend_url="${{ needs.deploy-render.outputs.backend_url }}"
          status="$(curl -sS -o /tmp/render-live.json -w '%{http_code}' "${backend_url}/live")"
          body="$(cat /tmp/render-live.json 2>/dev/null || echo '{}')"
          echo "status=$status body=$body"
          if [ "$status" != "200" ]; then
            echo "::error::${backend_url}/live respondió $status en vez de 200"
            exit 1
          fi
          if [ "$(echo "$body" | jq -r '.status // empty')" != "ok" ]; then
            echo "::error::${backend_url}/live no devolvió el JSON de liveness esperado (status:\"ok\"); body=$body"
            exit 1
          fi
          echo "OK: ${backend_url}/live respondió 200 con status:ok."

      - name: 'Smoke test contra /health del backend real de Render (tolerante al cold start, ventana de 90s)'
        run: scripts/smoke-health.sh "${{ needs.deploy-render.outputs.backend_url }}" 90 5

      - name: 'Smoke test del recorrido completo a través del proxy contra producción real (ventana de 120s)'
        run: scripts/smoke-proxy-health.sh "https://${{ needs.deploy-vercel.outputs.frontend_domain }}" 120 5
