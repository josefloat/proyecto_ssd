<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>

</div>

</button>

<!-- Bottom Navigation Bar (Hidden for Task/Form Focus Flow as per Shell Logic) -->
<!-- The "Shell Visibility" rule suppresses global nav during transactional flows -->
<script>
        function selectDoctor(element) {
            // Remove selection from all cards
            document.querySelectorAll('.rounded-2xl').forEach(card => {
                card.classList.remove('border-2', 'border-primary');
                card.classList.add('border', 'border-outline-variant');
                const badge = card.querySelector('.bg-primary.text-on-primary');
                if (badge) badge.remove();
            });

            // Add selection to clicked card
            element.classList.remove('border', 'border-outline-variant');
            element.classList.add('border-2', 'border-primary');

            const headerContainer = element.querySelector('.flex-1 > div:first-child');
            if (headerContainer && !headerContainer.querySelector('.bg-primary')) {
                const badge = document.createElement('span');
                badge.className = 'bg-primary text-on-primary px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1';
                badge.innerHTML = '<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: \'FILL\' 1;">check_circle</span>Médico seleccionado';
                headerContainer.appendChild(badge);
            }
        }
    </script>
