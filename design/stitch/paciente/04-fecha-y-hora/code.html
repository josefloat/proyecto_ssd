<!-- Navigation Shell Suppression: This is a sub-page with "Volver", so BottomNavBar is suppressed per protocol -->
<script>
        // Micro-interaction for calendar selection
        document.querySelectorAll('.flex-shrink-0.flex-col').forEach(item => {
            item.addEventListener('click', function() {
                if(this.classList.contains('opacity-40')) return;
                
                // Clear others (simplified logic)
                document.querySelectorAll('.flex-shrink-0.flex-col').forEach(el => {
                    el.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20');
                    el.classList.add('bg-surface-container-lowest', 'text-on-surface');
                    const check = el.querySelector('.absolute');
                    if(check) check.remove();
                });

                // Set this one
                this.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'bg-surface-container-high');
                this.classList.add('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20');
                
                const checkMark = document.createElement('div');
                checkMark.className = 'absolute -top-1 -right-1 bg-secondary-container text-on-secondary-container rounded-full p-1 border-2 border-primary';
                checkMark.innerHTML = '<span class="material-symbols-outlined text-[14px] font-bold">check</span>';
                this.appendChild(checkMark);
            });
        });

        // Time slot selection
        document.querySelectorAll('button:not([disabled])').forEach(btn => {
            if(btn.parentElement.classList.contains('grid')) {
                btn.addEventListener('click', function() {
                    // Clear all slots in the grids
                    document.querySelectorAll('.grid button:not([disabled])').forEach(b => {
                        b.classList.remove('border-2', 'border-primary', 'bg-primary-container/10', 'text-primary');
                        b.classList.add('border', 'border-outline-variant', 'bg-surface-container-lowest', 'text-on-surface');
                        const icon = b.querySelector('.material-symbols-outlined');
                        if(icon) icon.textContent = 'add';
                    });

                    // Set this one
                    this.classList.remove('border', 'border-outline-variant', 'bg-surface-container-lowest', 'text-on-surface');
                    this.classList.add('border-2', 'border-primary', 'bg-primary-container/10', 'text-primary');
                    const icon = this.querySelector('.material-symbols-outlined');
                    if(icon) icon.textContent = 'check_circle';
                });
            }
        });
    </script>
