<!-- BottomNavBar (Suppressed for focused task screen, but kept as a subtle placeholder or hidden based on instructions - here we hide for task focus) -->
<!-- The "Relevance Check" logic suggests suppressing navigation for task-focused pages with "Back" actions -->
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('label').classList.add('text-primary');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('label').classList.remove('text-primary');
                });
            });

            // Prevent scroll jumping on focus
            window.addEventListener('resize', () => {
                if (document.activeElement.tagName === 'INPUT') {
                    document.activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        });
    </script>
