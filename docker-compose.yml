services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: senal_de_vida
      POSTGRES_PASSWORD: senal_de_vida
      POSTGRES_DB: senal_de_vida
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senal_de_vida"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: senal-de-vida-api:local
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://senal_de_vida:senal_de_vida@db:5432/senal_de_vida?schema=public
      DIRECT_URL: postgresql://senal_de_vida:senal_de_vida@db:5432/senal_de_vida?schema=public
      PORT: "4000"
    ports:
      - "${API_PORT:-4001}:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: senal-de-vida-web:local
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://api:4000
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  db_data:
